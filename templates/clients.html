<!-- templates/clients.html -->
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدیریت کاربران · RVG Gateway</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue-50:#E6F1FB;--blue-100:#B5D4F4;--blue-200:#85B7EB;
  --blue-300:#5BA3E8;--blue-400:#378ADD;--blue-500:#2570C2;
  --blue-600:#185FA5;--blue-700:#11518F;--blue-800:#0C447C;--blue-900:#042C53;
  --green-bg:#EAF3DE;--green-text:#3B6D11;--green-dot:#6CA52E;
  --red-bg:#FCEBEB;--red-text:#A32D2D;--red-dot:#E24B4A;
  --amber-bg:#FAEEDA;--amber-text:#854F0B;--amber-dot:#D99A2B;
  --gray-bg:#F0F2F5;--gray-text:#5A6874;
  --border:#CFE3F7;--bg:#EEF5FE;--white:#fff;
  --shadow:0 1px 2px rgba(4,44,83,0.04), 0 1px 12px rgba(4,44,83,0.03);
}
body{font-family:'Vazirmatn',sans-serif;background:var(--bg);color:var(--text-1);padding:20px}
.container{max-width:1400px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:15px}
.header h1{font-size:22px;color:var(--blue-900);display:flex;align-items:center;gap:10px}
.header h1 i{color:var(--blue-400);font-size:28px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:25px}
.stat-card{background:var(--white);border-radius:14px;padding:18px;border:1px solid var(--border);box-shadow:var(--shadow)}
.stat-label{font-size:12px;color:var(--blue-400);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.stat-value{font-size:28px;font-weight:700;color:var(--blue-900)}
.stat-unit{font-size:13px;color:var(--blue-400);margin-right:4px}
.filters{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.filter-input{padding:10px 14px;border-radius:10px;border:1px solid var(--border);font-family:inherit;background:var(--white);min-width:180px}
.table-container{background:var(--white);border-radius:14px;border:1px solid var(--border);overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:right;padding:14px 12px;background:var(--blue-50);color:var(--blue-700);font-weight:600;font-size:12px}
td{padding:12px;border-bottom:1px solid var(--blue-50);font-size:12.5px}
tr:hover td{background:var(--blue-50)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-active{background:var(--green-bg);color:var(--green-text)}
.badge-ended{background:var(--red-bg);color:var(--red-text)}
.badge-offline{background:var(--gray-bg);color:var(--gray-text)}
.badge-warning{background:var(--amber-bg);color:var(--amber-text)}
.progress-bar{width:100px;height:6px;background:var(--blue-50);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.btn-icon{padding:6px 10px;border-radius:8px;border:none;cursor:pointer;background:transparent;transition:.15s}
.btn-icon:hover{background:var(--blue-50)}
.btn-edit{color:var(--blue-600)}
.btn-delete{color:var(--red-text)}
.btn-reset{color:var(--amber-dot)}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{background:var(--white);border-radius:16px;padding:28px;max-width:600px;width:90%;max-height:85vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:18px;font-weight:700;color:var(--blue-900)}
.close-modal{background:none;border:none;font-size:24px;cursor:pointer;color:var(--blue-400)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--blue-700);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);font-family:inherit;font-size:13px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{font-family:inherit;padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--blue-600);color:#fff}
.btn-secondary{background:var(--gray-bg);color:var(--gray-text)}
.btn-danger{background:var(--red-bg);color:var(--red-text)}
.modal-footer{display:flex;justify-content:flex-end;gap:12px;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><i class="ti ti-users"></i> مدیریت کاربران</h1>
    <button class="btn btn-primary" onclick="openCreateModal()"><i class="ti ti-plus"></i> کاربر جدید</button>
  </div>
  
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="stat-label"><i class="ti ti-users"></i> کل کاربران</div><div class="stat-value" id="totalClients">0</div></div>
    <div class="stat-card"><div class="stat-label"><i class="ti ti-circle-check"></i> کاربران فعال</div><div class="stat-value" id="activeClients">0</div></div>
    <div class="stat-card"><div class="stat-label"><i class="ti ti-database"></i> کل ترافیک</div><div class="stat-value" id="totalTraffic">0<span class="stat-unit">GB</span></div></div>
    <div class="stat-card"><div class="stat-label"><i class="ti ti-chart-bar"></i> مصرف شده</div><div class="stat-value" id="usedTraffic">0<span class="stat-unit">GB</span></div></div>
  </div>
  
  <div class="filters">
    <input type="text" class="filter-input" id="searchInput" placeholder="جستجوی نام کاربری..." onkeyup="filterTable()">
    <select class="filter-input" id="statusFilter" onchange="filterTable()">
      <option value="">همه وضعیت‌ها</option>
      <option value="active">فعال</option>
      <option value="ended">پایان یافته</option>
      <option value="offline">آفلاین</option>
    </select>
  </div>
  
  <div class="table-container">
    <table>
      <thead>
        <tr><th>نام کاربری</th><th>اشتراک ID</th><th>مصرف / سقف</th><th>روزهای باقی</th><th>وضعیت</th><th>گروه</th><th>عملیات</th></tr>
      </thead>
      <tbody id="clientsTable"></tbody>
    </table>
  </div>
</div>

<!-- مودال ویرایش کاربر -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <div class="modal-header"><h3 class="modal-title">ویرایش کاربر</h3><button class="close-modal" onclick="closeModal()">&times;</button></div>
    <form id="editForm">
      <input type="hidden" id="editUsername">
      <div class="form-row">
        <div class="form-group"><label>نام کاربری</label><input type="text" id="editUsernameDisplay" disabled></div>
        <div class="form-group"><label>ایمیل</label><input type="email" id="editEmail"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>سقف ترافیک (GB)</label><input type="number" id="editTotalLimit" step="0.01"></div>
        <div class="form-group"><label>مصرف شده (GB)</label><input type="number" id="editUsed" step="0.01"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>روز اعتبار</label><input type="number" id="editExpiryDays"></div>
        <div class="form-group"><label>وضعیت</label><select id="editStatus"><option value="active">فعال</option><option value="ended">پایان یافته</option><option value="offline">آفلاین</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>گروه</label><input type="text" id="editGroup" placeholder="مثلاً Sajdaj,Seyed"></div>
        <div class="form-group"><label>آیدی تلگرام</label><input type="number" id="editTelegramId"></div>
      </div>
      <div class="form-group"><label>توضیحات</label><textarea id="editComment" rows="2"></textarea></div>
      <div class="form-group"><label><input type="checkbox" id="editAutoRenew"> تمدید خودکار</label></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeModal()">انصراف</button>
        <button type="submit" class="btn btn-primary">ذخیره تغییرات</button>
      </div>
    </form>
  </div>
</div>

<script>
let clientsData = [];

async function loadClients() {
  try {
    const res = await fetch('/api/clients/');
    const data = await res.json();
    clientsData = data.clients || [];
    updateStats(data.stats);
    renderTable();
  } catch(e) { console.error(e); }
}

function updateStats(stats) {
  if(stats) {
    document.getElementById('totalClients').textContent = stats.total_clients || 0;
    document.getElementById('activeClients').textContent = stats.active_clients || 0;
    document.getElementById('totalTraffic').innerHTML = (stats.total_traffic_gb || 0).toFixed(1) + '<span class="stat-unit">GB</span>';
    document.getElementById('usedTraffic').innerHTML = (stats.used_traffic_gb || 0).toFixed(1) + '<span class="stat-unit">GB</span>';
  }
}

function getStatusBadge(status, usagePercent, isExpired) {
  if(isExpired) return '<span class="badge badge-ended"><i class="ti ti-calendar-off"></i> منقضی</span>';
  if(status === 'active') return '<span class="badge badge-active"><i class="ti ti-circle-check"></i> فعال</span>';
  if(status === 'ended') return '<span class="badge badge-ended"><i class="ti ti-calendar-x"></i> پایان یافته</span>';
  if(status === 'offline') return '<span class="badge badge-offline"><i class="ti ti-plug-off"></i> آفلاین</span>';
  if(usagePercent > 90) return '<span class="badge badge-warning"><i class="ti ti-alert-triangle"></i> نزدیک به اتمام</span>';
  return '<span class="badge badge-offline">نامشخص</span>';
}

function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const filtered = clientsData.filter(c => {
    const matchSearch = c.username.toLowerCase().includes(search);
    const matchStatus = !status || c.status === status || (status === 'active' && !c.is_expired);
    return matchSearch && matchStatus;
  });
  
  const tbody = document.getElementById('clientsTable');
  if(filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px">هیچ کاربری یافت نشد</td></tr>';
    return;
  }
  
  tbody.innerHTML = filtered.map(c => {
    const percent = c.usage_percent || 0;
    const barColor = percent > 90 ? 'var(--red-dot)' : percent > 70 ? 'var(--amber-dot)' : 'var(--blue-400)';
    const remainingDays = c.expiry_days || 0;
    const daysText = remainingDays === 0 ? 'منقضی' : remainingDays + ' روز';
    return `
      <tr>
        <td><strong>${escapeHtml(c.username)}</strong><br><small style="color:var(--blue-400)">${c.uuid.substring(0,8)}...</small></td>
        <td><code style="font-size:11px">${c.subscription_id}</code></td>
        <td>
          <div>${c.used_gb.toFixed(1)} / ${c.total_limit_gb.toFixed(1)} GB</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${percent}%;background:${barColor}"></div></div>
        </td>
        <td>${daysText}</td>
        <td>${getStatusBadge(c.status, percent, c.is_expired)}</td>
        <td><small>${c.group || '-'}</small></td>
        <td>
          <button class="btn-icon btn-edit" onclick="editClient('${c.username}')" title="ویرایش"><i class="ti ti-edit"></i></button>
          <button class="btn-icon btn-reset" onclick="resetUsage('${c.username}')" title="ریست مصرف"><i class="ti ti-rotate"></i></button>
          <button class="btn-icon btn-delete" onclick="deleteClient('${c.username}')" title="حذف"><i class="ti ti-trash"></i></button>
        </td>
      </tr>
    `;
  }).join('');
}

function escapeHtml(s) { return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function filterTable() { renderTable(); }

async function editClient(username) {
  const client = clientsData.find(c => c.username === username);
  if(!client) return;
  
  document.getElementById('editUsername').value = username;
  document.getElementById('editUsernameDisplay').value = username;
  document.getElementById('editEmail').value = client.email || '';
  document.getElementById('editTotalLimit').value = client.total_limit_gb;
  document.getElementById('editUsed').value = client.used_gb;
  document.getElementById('editExpiryDays').value = client.expiry_days;
  document.getElementById('editStatus').value = client.status;
  document.getElementById('editGroup').value = client.group || '';
  document.getElementById('editTelegramId').value = client.telegram_user_id || '';
  document.getElementById('editComment').value = client.comment || '';
  document.getElementById('editAutoRenew').checked = client.auto_renew || false;
  
  document.getElementById('editModal').classList.add('active');
}

function closeModal() { document.getElementById('editModal').classList.remove('active'); }

document.getElementById('editForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('editUsername').value;
  const data = {
    email: document.getElementById('editEmail').value,
    total_limit_gb: parseFloat(document.getElementById('editTotalLimit').value),
    used_gb: parseFloat(document.getElementById('editUsed').value),
    expiry_days: parseInt(document.getElementById('editExpiryDays').value),
    status: document.getElementById('editStatus').value,
    group: document.getElementById('editGroup').value,
    telegram_user_id: parseInt(document.getElementById('editTelegramId').value) || null,
    comment: document.getElementById('editComment').value,
    auto_renew: document.getElementById('editAutoRenew').checked
  };
  
  try {
    const res = await fetch(`/api/clients/${username}`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    if(res.ok) {
      Swal.fire('موفق', 'اطلاعات کاربر بروزرسانی شد', 'success');
      closeModal();
      loadClients();
    } else {
      Swal.fire('خطا', 'مشکلی پیش آمد', 'error');
    }
  } catch(e) { Swal.fire('خطا', e.message, 'error'); }
});

async function resetUsage(username) {
  const result = await Swal.fire({title: 'تایید', text: 'آیا از ریست مصرف این کاربر مطمئن هستید؟', icon: 'warning', showCancelButton: true});
  if(result.isConfirmed) {
    const res = await fetch(`/api/clients/${username}/reset`, {method: 'POST'});
    if(res.ok) { Swal.fire('موفق', 'مصرف کاربر ریست شد', 'success'); loadClients(); }
    else { Swal.fire('خطا', 'مشکلی پیش آمد', 'error'); }
  }
}

async function deleteClient(username) {
  const result = await Swal.fire({title: 'حذف کاربر', text: `آیا از حذف ${username} مطمئن هستید؟`, icon: 'warning', showCancelButton: true});
  if(result.isConfirmed) {
    const res = await fetch(`/api/clients/${username}`, {method: 'DELETE'});
    if(res.ok) { Swal.fire('موفق', 'کاربر حذف شد', 'success'); loadClients(); }
    else { Swal.fire('خطا', 'مشکلی پیش آمد', 'error'); }
  }
}

function openCreateModal() {
  Swal.fire({
    title: 'کاربر جدید',
    html: `
      <input id="swal-username" class="swal2-input" placeholder="نام کاربری">
      <input id="swal-email" class="swal2-input" placeholder="ایمیل">
      <input id="swal-limit" class="swal2-input" placeholder="سقف ترافیک (GB)" value="50">
      <input id="swal-days" class="swal2-input" placeholder="روز اعتبار" value="30">
    `,
    showCancelButton: true,
    preConfirm: async () => {
      const data = {
        username: document.getElementById('swal-username').value,
        email: document.getElementById('swal-email').value,
        total_limit_gb: parseFloat(document.getElementById('swal-limit').value),
        expiry_days: parseInt(document.getElementById('swal-days').value)
      };
      if(!data.username) { Swal.showValidationMessage('نام کاربری الزامی است'); return false; }
      const res = await fetch('/api/clients/', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
      if(!res.ok) { Swal.showValidationMessage('خطا در ایجاد کاربر'); return false; }
      return true;
    }
  }).then(result => { if(result.isConfirmed) { Swal.fire('موفق', 'کاربر ایجاد شد', 'success'); loadClients(); } });
}

loadClients();
setInterval(loadClients, 10000);
</script>
</body>
</html>
